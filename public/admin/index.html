<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Admin | Neo Deter del Perú</title>
    <script>
      (function () {
        var isProductionDomain =
          window.location.hostname === "neodeter.pe" ||
          window.location.hostname === "www.neodeter.pe";

        if (!isProductionDomain) {
          return;
        }

        var target = new URL("https://neodeter.netlify.app/admin/");
        target.hash = window.location.hash;
        window.location.replace(target.toString());
      })();
    </script>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <script>
      window.netlifyIdentity?.init({
        APIUrl: "https://neodeter.netlify.app/.netlify/identity",
      });
    </script>
  </head>
  <body>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  </body>
</html>
