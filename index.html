  <body>
    <div id="root"></div>
    <script>
      (function () {
        var identityTokenPattern =
          /(?:^#|[&#])(invite_token|confirmation_token|recovery_token|email_change_token)=/;

        if (!identityTokenPattern.test(window.location.hash)) {
          return;
        }

        var normalizedPath = window.location.pathname.replace(/\/+$/, "");

        if (normalizedPath === "/admin") {
          return;
        }

        var target = new URL("https://neodeter.netlify.app/admin/");
        target.hash = window.location.hash;
        window.location.replace(target.toString());
      })();
    </script>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <script>
      (function () {
        var redirectPath = sessionStorage.getItem("redirectPath");

        if (!redirectPath) {
          return;
        }

        sessionStorage.removeItem("redirectPath");

        var currentPath = window.location.pathname + window.location.search + window.location.hash;

        if (redirectPath !== currentPath) {
          window.history.replaceState(null, "", redirectPath);
        }
      })();

      (function () {
        if (!window.netlifyIdentity) {
          return;
        }

        window.netlifyIdentity.init({
          APIUrl: "https://neodeter.netlify.app/.netlify/identity",
        });

        var getAdminPath = function () {
          var pathname = window.location.pathname;
          var basePath = pathname.endsWith("/")
            ? pathname
            : pathname.slice(0, pathname.lastIndexOf("/") + 1);

          return basePath + "admin/";
        };

        window.netlifyIdentity.on("init", function (user) {
          if (user) {
            return;
          }

          window.netlifyIdentity.on("login", function () {
            window.location.replace(getAdminPath());
          });
        });
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
